# PAI Pulse Configuration
# Copy this file to PULSE.toml and customize for your setup

[pulse]
port = 31337
host = "localhost"

[modules]
# Enable/disable modules by setting to true/false
hooks = true
observability = true

[observability]
enabled = true
# ${USERPROFILE} is resolved at load time (see pulse.ts loadPulseConfig) so this
# shared config stays portable across machines — never hardcode a username here.
dashboard_dir = "${USERPROFILE}/.claude/PAI/PULSE/Observability/out"

# Example custom module — create your own in modules/
# my_module = true

[voice]
enabled = true
# Provider is pinned to Piper (local, offline, no API key). ElevenLabs is
# intentionally NOT used on this machine.
tts_provider = "piper"

# ── Piper (local) ──
# Paths use ${USERPROFILE}, resolved at load time (pulse.ts loadPulseConfig) so
# this shared config is portable — never hardcode a username. These point at the
# real, verified assets under ~/.claude/VoiceServer (piper-bin + piper-voices).
piper_binary = "${USERPROFILE}/.claude/VoiceServer/piper-bin/piper/piper.exe"
piper_voice_model = "${USERPROFILE}/.claude/VoiceServer/piper-voices/en_US-amy-medium/en_US-amy-medium.onnx"

[notifications]
enabled = true

[checks]
# Health check interval in seconds
interval = 300
# Add your custom checks in checks/

# ── Digital Assistant (DA) subsystem ──
# Gate for Assistant/module.ts. `enabled = true` makes pulse.ts import the
# module and serve /assistant/*. Source of truth for WHICH DA is active and its
# identity is _registry.yaml (primary:) + PAI/USER/DA/<primary>/ — NOT this file.
# This section holds only the operational schedule (registry-as-truth, plan §6
# Option A). pulse.ts reads these as top-level parsed.da keys via smol-toml.
[da]
enabled = true
# Heartbeat: the AS1 proactivity primitive. Every 30 min, Layer 1 gathers
# context (free), Layer 2 (Haiku via Inference.ts) decides NO_ACTION | notify.
heartbeat_schedule = "*/30 * * * *"
heartbeat_model = "fast"          # Inference.ts level → Haiku. NEVER claude --bare (billing).
heartbeat_cost_ceiling = 0.10     # USD per heartbeat evaluation
# Growth cadence (diary nightly, opinions weekly). Reserved for the growth jobs.
diary_schedule = "0 23 * * *"
growth_schedule = "0 4 * * 0"

# ── DA cron jobs (the proactive loop) ──
# These wire the DA check-scripts into Pulse's cron loop (the ONLY scheduler,
# pulse.ts:495 → lib.ts parsed.job). SAFETY PHASE-GATE: THREE of four ship
# enabled=false. da-scheduled-tasks and da-heartbeat are the AUTONOMOUS ACTUATION
# + GENERATION surfaces — an auto-generator wired to an unaudited actuator is
# exactly what the plan's phase gate forbids. da-growth AUTONOMOUSLY MUTATES
# PERSONA (opinion decay/prune now; trait drift when DA_GROWTH_EXTRACT=1) — same
# safety family, so it ships OFF too so persona drift doesn't begin with no
# observation window (advisor 2026-07-04). Only da-diary (append-only, no
# dispatch, no persona mutation) ships ON.

[[job]]
name = "da-scheduled-tasks"
schedule = "* * * * *"                 # every minute; isDue() dedups to once/min
type = "script"
command = "bun run checks/da-tasks.ts"
output = "voice"
enabled = false                        # PHASE-GATE: enable after fire-executor audit + principal opt-in

[[job]]
name = "da-heartbeat"
schedule = "*/30 * * * *"              # heartbeat_schedule — the AS1 proactivity poll
type = "script"
command = "bun run checks/da-heartbeat.ts"
output = "voice"
enabled = false                        # PHASE-GATE: enable after fire-executor audit + principal opt-in

[[job]]
name = "da-diary"
schedule = "0 23 * * *"                # diary_schedule — nightly, silent writer
type = "script"
command = "bun run checks/da-diary.ts"
output = "log"
enabled = true

[[job]]
name = "da-growth"
schedule = "0 4 * * 0"                 # growth_schedule — weekly Sun 4 AM, silent writer
type = "script"
command = "bun run checks/da-growth.ts"
output = "log"
enabled = false                        # PHASE-GATE: autonomous persona mutation — enable after an observation window
