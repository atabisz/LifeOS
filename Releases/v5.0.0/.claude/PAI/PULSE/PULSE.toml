# PAI Pulse Configuration
# Copy this file to PULSE.toml and customize for your setup

[pulse]
port = 31337
host = "localhost"

[modules]
# Enable/disable modules by setting to true/false
hooks = true
observability = true

[observability]
enabled = true
# ${USERPROFILE} is resolved at load time (see pulse.ts loadPulseConfig) so this
# shared config stays portable across machines — never hardcode a username here.
dashboard_dir = "${USERPROFILE}/.claude/PAI/PULSE/Observability/out"

# Example custom module — create your own in modules/
# my_module = true

[voice]
enabled = true
# Provider is pinned to Piper (local, offline, no API key). ElevenLabs is
# intentionally NOT used on this machine.
tts_provider = "piper"

# ── Piper (local) ──
# Paths use ${USERPROFILE}, resolved at load time (pulse.ts loadPulseConfig) so
# this shared config is portable — never hardcode a username. These point at the
# real, verified assets under ~/.claude/VoiceServer (piper-bin + piper-voices).
piper_binary = "${USERPROFILE}/.claude/VoiceServer/piper-bin/piper/piper.exe"
piper_voice_model = "${USERPROFILE}/.claude/VoiceServer/piper-voices/en_US-amy-medium/en_US-amy-medium.onnx"

[notifications]
enabled = true

[checks]
# Health check interval in seconds
interval = 300
# Add your custom checks in checks/
